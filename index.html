<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f6b4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Halqa Hub" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="icon" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <title>Abdul Nasir's Halqa Hub</title>
  <link rel="stylesheet" href="styles.css?v=20260612c" />
  <script>try{var t=localStorage.getItem('hub_theme');if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
</head>
<body>
  <!-- Login gate (shown only in live mode when signed out) -->
  <div id="login" class="login hidden">
    <form id="loginForm" class="login-card">
      <div class="login-logo"><svg class="logo-svg" viewBox="0 0 64 64" aria-hidden="true"><g fill="currentColor"><rect x="23" y="7" width="18" height="18" rx="2"/><rect x="23" y="7" width="18" height="18" rx="2" transform="rotate(45 32 16)"/><path d="M32 33 C26 30, 18 30, 13 33 L13 48 C18 45, 26 45, 32 48 Z"/><path d="M32 33 C38 30, 46 30, 51 33 L51 48 C46 45, 38 45, 32 48 Z"/></g></svg></div>
      <h1>Halqa Hub</h1>
      <p class="muted">Abdul Nasir's Halqa · sign in to continue</p>
      <input id="email" type="email" placeholder="Email" autocomplete="username" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <p id="loginError" class="error"></p>
    </form>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <button class="back-btn" id="backBtn" aria-label="Back">‹</button>
      <div class="brand">
        <span class="brand-mark"><svg class="logo-svg" viewBox="0 0 64 64" aria-hidden="true"><g fill="currentColor"><rect x="23" y="7" width="18" height="18" rx="2"/><rect x="23" y="7" width="18" height="18" rx="2" transform="rotate(45 32 16)"/><path d="M32 33 C26 30, 18 30, 13 33 L13 48 C18 45, 26 45, 32 48 Z"/><path d="M32 33 C38 30, 46 30, 51 33 L51 48 C46 45, 38 45, 32 48 Z"/></g></svg></span>
        <div>
          <strong id="brandTitle">Halqa Hub</strong>
          <small id="brandSub">Abdul Nasir's Halqa</small>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="themeBtn" class="icon-btn" title="Theme">🎨</button>
        <button id="syncBtn" class="sync-btn hidden" title="Sync to OneDrive now">⟳ Sync</button>
        <span id="modeBadge" class="badge-mode">demo</span>
        <button id="signOutBtn" class="signout-btn hidden" title="Sign out">⎋ Sign out</button>
      </div>
      <div id="themeMenu" class="theme-menu hidden"></div>
    </header>
    <div id="syncInfo" class="status-strip hidden"></div>

    <nav class="tabbar">
      <button class="tab active" data-view="roster">👥 Students</button>
      <button class="tab" data-view="dashboard">📊 Dashboard</button>
    </nav>

    <!-- ROSTER VIEW -->
    <section id="rosterView" class="view">
      <div class="controls">
        <input id="search" type="search" placeholder="Search name, ID, city, profession…" />
        <select id="statusFilter">
          <option value="">All statuses</option>
        </select>
        <select id="sortBy">
          <option value="id">Sort: ID#</option>
          <option value="name">Sort: Name</option>
          <option value="att">Sort: Attendance %</option>
          <option value="nabawi">Sort: Nabawi score</option>
        </select>
      </div>
      <button id="bulkAttBtn" class="bulk-cta">🗓️ Mark Class Attendance</button>
      <button id="bulkFuBtn" class="bulk-cta">📞 Mark Next-Class Follow-up</button>
      <button id="mulaqatBtn" class="bulk-cta">🤝 Physical Mulaqat Tracker</button>
      <div id="rosterCount" class="roster-count"></div>
      <div id="roster" class="roster"></div>
    </section>

    <!-- DETAIL VIEW -->
    <section id="detailView" class="view hidden"></section>

    <!-- DASHBOARD VIEW -->
    <section id="dashboardView" class="view hidden"></section>

    <!-- BULK FOLLOW-UP VIEW -->
    <section id="bulkView" class="view hidden"></section>

    <!-- BULK ATTENDANCE VIEW -->
    <section id="attBulkView" class="view hidden"></section>

    <!-- MULAQAT TRACKER VIEW -->
    <section id="mulaqatView" class="view hidden"></section>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Supabase config (optional). If present and filled, app runs in LIVE mode. -->
  <script src="config.js" onerror="window.__noConfig=true"></script>
  <!-- Supabase client (only used in live mode) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20260612c"></script>
</body>
</html>
